<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORACLE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    canvas { display: block; }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      letter-spacing: 4px;
      font-weight: 200;
      z-index: 30;
      transition: opacity 1.5s;
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }
    #overlay h1 {
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      font-weight: 200;
      letter-spacing: 8px;
      text-transform: uppercase;
    }
    #world-indicator {
      color: rgba(255,255,255,0.12);
      font-size: 9px;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* ── Chat panel ── */
    #chat-container {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 280px;
      max-height: 50vh;
      display: flex;
      flex-direction: column;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      overflow: hidden;
    }

    #chat-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    #status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #555;
    }

    #connect-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.35);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 4px;
    }
    #connect-btn:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 32vh;
      scrollbar-width: none;
    }
    #chat-messages::-webkit-scrollbar { display: none; }

    .msg { font-size: 11px; line-height: 1.5; max-width: 92%; animation: fadeIn 0.4s ease; }
    .msg-oracle { color: rgba(255,255,255,0.7); font-weight: 300; }
    .msg-user { color: rgba(255,255,255,0.4); align-self: flex-end; text-align: right; }
    .msg-system { color: rgba(255,255,255,0.15); font-size: 9px; font-style: italic; align-self: center; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #chat-input-row {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
      align-items: center;
    }

    #chat-input {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      padding: 7px 10px;
      font-family: inherit;
      outline: none;
      border-radius: 6px;
    }
    #chat-input:focus { border-color: rgba(255,255,255,0.18); }
    #chat-input::placeholder { color: rgba(255,255,255,0.15); }

    #mic-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    #mic-btn:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }
    #mic-btn.listening {
      border-color: #ef4444;
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    }

    /* ── Waypoint bar ── */
    #waypoint-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 15;
    }
    .wp-btn {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 20px;
      transition: all 0.3s;
    }
    .wp-btn:hover {
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.08);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      text-shadow: 0 0 30px rgba(255,255,255,0.3);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.v { opacity: 1; }

    /* ── Gesture label ── */
    #gesture-label {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 15;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.25);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    /* ── Camera feed + overlay ── */
    #cam {
      position: fixed;
      bottom: 60px;
      left: 16px;
      width: 280px;
      height: 210px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      z-index: 15;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.6;
      display: none;
    }
    #cam-overlay {
      position: fixed;
      bottom: 60px;
      left: 16px;
      width: 280px;
      height: 210px;
      z-index: 16;
      pointer-events: none;
      display: none;
      border-radius: 8px;
    }

    /* ── Hands button ── */
    #hands-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.35);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 4px;
      margin-left: auto;
    }
    #hands-btn:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); }
    #hands-btn.active {
      border-color: #4ade80;
      color: #4ade80;
      background: rgba(74,222,128,0.08);
    }

    /* ── Nav hint ── */
    #hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.2);
      font-size: 9px;
      letter-spacing: 2px;
      z-index: 10;
      pointer-events: none;
      transition: opacity 2s;
    }
  </style>
</head>
<body>
  <div id="loading">entering cottage...</div>

  <div id="overlay">
    <h1>ORACLE</h1>
    <div id="world-indicator"></div>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Gesture label -->
  <div id="gesture-label"></div>

  <!-- Camera feed -->
  <video id="cam" autoplay playsinline></video>
  <canvas id="cam-overlay"></canvas>

  <div id="hint">head = look &middot; right hand = pull/push &middot; left hand = move &middot; fist = switch</div>

  <!-- Waypoint bar -->
  <div id="waypoint-bar"></div>

  <div id="chat-container">
    <div id="chat-header">
      <span id="status-dot"></span>
      <button id="connect-btn">connect gemini</button>
      <button id="hands-btn">tracking</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="speak to the oracle..." autocomplete="off" />
      <button id="mic-btn"><span id="mic-icon">◉</span></button>
    </div>
  </div>

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>

  <script type="module" src="/src/main.js"></script>
  <script>
    // Fade hint after 6s
    setTimeout(() => {
      const h = document.getElementById('hint');
      if (h) h.style.opacity = '0';
    }, 6000);
  </script>
</body>
</html>
